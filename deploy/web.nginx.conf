# Service statique de l'interface OpenCacao. En-têtes de sécurité (OWASP) que la
# balise <meta> CSP ne peut pas poser elle-même.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Anti-cache périmé après déploiement : l'app est statique SANS versionnage de
    # fichiers (pas d'étape de build). Sans en-tête, Cloudflare met le CSS/JS en cache
    # 4 h → après un déploiement, le markup neuf s'affiche avec l'ancien CSS (rendu
    # cassé). « no-cache » force la revalidation (ETag/304) : Cloudflare et le
    # navigateur revérifient l'origine, donc un déploiement est visible immédiatement.
    # Les images (assets/) gardent un cache long : elles ne changent qu'avec leur nom.
    location / {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:png|jpg|jpeg|svg|gif|ico|webp|woff2?)$ {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }
}

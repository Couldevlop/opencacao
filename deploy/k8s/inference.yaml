# Inférence CPU : serveur llama.cpp (OpenAI-compatible) servant le GGUF.
# JAMAIS exposé publiquement (ClusterIP). Le GGUF est sur un volume persistant.
#
# Le serveur officiel llama.cpp expose /v1/chat/completions (compatible OpenAI),
# ce que consomme l'API. Choisir un tag récent (support de l'archi mistral3).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: modele-gguf
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: hcloud-volumes   # CSI Hetzner ; adapter si autre
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  labels: { app: inference }
spec:
  replicas: 1
  selector:
    matchLabels: { app: inference }
  strategy: { type: Recreate }   # volume RWO mono-attache
  template:
    metadata:
      labels: { app: inference }
    spec:
      containers:
        - name: llamacpp
          image: ghcr.io/ggml-org/llama.cpp:server
          args:
            - "-m"
            - "/models/opencacao-7b-Q4_K_M.gguf"
            - "--alias"
            - "opencacao-7b"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "-c"
            - "4096"
            - "-t"
            - "6"          # threads CPU — adapter au nœud
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: modele
              mountPath: /models
              readOnly: true
          resources:
            requests: { cpu: "4", memory: "8Gi" }
            limits: { cpu: "8", memory: "12Gi" }
          readinessProbe:
            httpGet: { path: /v1/models, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30   # le 1er chargement du GGUF peut être long
      volumes:
        - name: modele
          persistentVolumeClaim:
            claimName: modele-gguf
---
apiVersion: v1
kind: Service
metadata:
  name: inference
spec:
  selector: { app: inference }
  ports:
    - port: 8000
      targetPort: 8000

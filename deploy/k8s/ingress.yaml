# Ingress (Traefik, inclus dans K3s) + TLS via cert-manager.
# Routage par chemin sur UN domaine -> même origine pour le navigateur :
#   /v1   -> api  (endpoints)
#   /     -> web  (interface)
# Seuls web et api sont exposés ; inference et redis restent internes.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencacao
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod   # <-- ton ClusterIssuer
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - opencacao.example.ci        # <-- REMPLACER par ton domaine
      secretName: opencacao-tls
  rules:
    - host: opencacao.example.ci      # <-- REMPLACER par ton domaine
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80

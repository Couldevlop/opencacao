# Ingress (Traefik, inclus dans K3s) + TLS via cert-manager.
# Routage par chemin sur UN domaine -> même origine pour le navigateur :
#   /v1   -> api  (endpoints)
#   /     -> web  (interface)
# Seuls web et api sont exposés ; inference et redis restent internes.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opencacao
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # SSE (/v1/chat/stream) : pas de mise en tampon, sinon le flux arrive d'un bloc.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - opencacao.openlabconsulting.com
      secretName: opencacao-tls
  rules:
    - host: opencacao.openlabconsulting.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80

# Cloisonnement : inference et redis n'acceptent QUE le trafic de l'API.
# (K3s applique les NetworkPolicies via son contrôleur intégré ; sinon, sans
#  effet mais sans danger.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inference-from-api-only
spec:
  podSelector:
    matchLabels: { app: inference }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: api }
      ports:
        - protocol: TCP
          port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-from-api-only
spec:
  podSelector:
    matchLabels: { app: redis }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: api }
      ports:
        - protocol: TCP
          port: 6379

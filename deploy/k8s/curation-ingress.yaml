# Ingress de la console de curation — sous-domaine dédié, HTTPS, protégé par
# l'auth HTTP Basic de l'application (Secret curation-auth).
#
# DNS requis : enregistrement A « curation.opencacao » -> 62.238.11.20 (Cloudflare).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: curation
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Durcissement recommandé (OWASP) : restreindre l'accès aux IP de l'équipe.
    # La console a un accès en ÉCRITURE au corpus d'entraînement ; combiné au
    # blocage anti-brute-force applicatif, restreindre l'ingress par IP réduit
    # encore la surface. Décommenter et renseigner les CIDR autorisés :
    # nginx.ingress.kubernetes.io/whitelist-source-range: "203.0.113.0/24,198.51.100.7/32"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - curation.opencacao.openlabconsulting.com
      secretName: curation-tls
  rules:
    - host: curation.opencacao.openlabconsulting.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: curation
                port:
                  number: 8090

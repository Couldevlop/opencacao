# Déploiement OpenCacao sur K3s (Hetzner, CPU/GGUF).
#   kubectl apply -k deploy/k8s/   (ou via l'Application ArgoCD, cf. deploy/argocd/)
#
# Images servies depuis GHCR (construites par .github/workflows/release.yml). Le tag
# est tenu à jour par ArgoCD Image Updater (stratégie semver) ; la valeur ci-dessous
# n'est que l'amorçage. À PERSONNALISER : ton domaine (api.yaml + ingress.yaml),
# le ClusterIssuer TLS (ingress.yaml), la storageClass (inference.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opencacao

resources:
  - namespace.yaml
  - redis.yaml
  - inference.yaml
  - dataset-pvc.yaml
  - api.yaml
  - curation.yaml
  - curation-rbac.yaml
  - curation-ingress.yaml
  - web.yaml
  - ingress.yaml
  - networkpolicy.yaml
  - cron-enrichissement.yaml
  - cron-watchdog.yaml

images:
  - name: opencacao-api
    newName: ghcr.io/couldevlop/opencacao-api
    newTag: "0.6.28"
  - name: opencacao-web
    newName: ghcr.io/couldevlop/opencacao-web
    newTag: "0.6.28"

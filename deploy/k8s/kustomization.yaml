# Déploiement OpenCacao sur K3s (Hetzner, CPU/GGUF).
#   kubectl apply -k deploy/k8s/
#
# À PERSONNALISER : thomcoul (ici), ton domaine (api.yaml + ingress.yaml),
# le ClusterIssuer TLS (ingress.yaml), la storageClass (inference.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opencacao

resources:
  - namespace.yaml
  - redis.yaml
  - inference.yaml
  - dataset-pvc.yaml
  - api.yaml
  - curation.yaml
  - curation-rbac.yaml
  - curation-ingress.yaml
  - web.yaml
  - ingress.yaml
  - networkpolicy.yaml

images:
  - name: opencacao-api
    newName: docker.io/thomcoul/opencacao-api   # <-- ton compte Docker Hub
    newTag: "0.1.18"
  - name: opencacao-web
    newName: docker.io/thomcoul/opencacao-web    # <-- ton compte Docker Hub
    newTag: "0.1.7"

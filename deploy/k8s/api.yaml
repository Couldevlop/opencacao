# API FastAPI : garde-fous, cache, appel à l'inférence interne.
# Seule (avec web) joignable de l'extérieur, via l'Ingress.
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  INFERENCE_BACKEND: "llama-cpp"
  INFERENCE_URL: "http://inference:8000"
  REDIS_URL: "redis://redis:6379/0"
  MODEL_NAME: "opencacao-8b"
  MODEL_VERSION: "1.0.0"
  RATE_LIMIT_PER_MIN: "20"
  LOG_LEVEL: "INFO"
  ENABLE_DOCS: "false"
  # Derrière l'Ingress Traefik : on fait confiance à X-Forwarded-For.
  TRUST_FORWARDED_FOR: "true"
  # Même origine (servie via l'Ingress) -> CORS inutile.
  CORS_ORIGINS: ""
  # "*" : le filtrage d'hôte est fait par l'Ingress (ne route que le domaine vers
  # l'API) ; "*" évite que TrustedHost rejette les sondes k8s (Host = IP du pod).
  ALLOWED_HOSTS: "*"
  # Inférence CPU lente : timeout interne large (le 60 s par défaut coupait les
  # générations longues -> 503). Cohérent avec proxy-read-timeout de l'Ingress.
  REQUEST_TIMEOUT_S: "300"
  # Journalisation (anonymisée) des interactions + retours 👍/👎 -> jeu de données.
  LOG_QUESTIONS: "true"
  DATASET_DIR: "/data"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      securityContext:
        fsGroup: 10001   # rend le volume /data inscriptible par l'utilisateur appuser
      containers:
        - name: api
          image: opencacao-api   # tag/registre fixés par kustomization.yaml
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
          volumeMounts:
            - name: dataset
              mountPath: /data
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
              httpHeaders:
                - name: Host
                  value: opencacao.openlabconsulting.com
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
              httpHeaders:
                - name: Host
                  value: opencacao.openlabconsulting.com
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: dataset
          persistentVolumeClaim:
            claimName: dataset
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - port: 8080
      targetPort: 8080

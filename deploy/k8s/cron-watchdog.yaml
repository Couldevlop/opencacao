# Supervision (« dead-man's switch ») du CronJob d'enrichissement : vérifie chaque
# jour qu'une exécution a réussi récemment et alerte par email sinon (cron arrêté,
# suspendu ou en échec). Décalé après l'enrichissement (03:00) pour laisser le temps
# au job du jour de réussir. Réutilise l'image de l'API et le ServiceAccount curation
# (droit get sur le CronJob enrichissement-rag, cf. curation-rbac.yaml).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: watchdog-enrichissement
  labels: { app: watchdog }
spec:
  schedule: "30 4 * * *" # tous les jours à 04:30 UTC (après l'enrichissement de 03:00)
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 1
      template:
        metadata:
          labels: { app: watchdog }
        spec:
          serviceAccountName: curation # autorise la lecture du CronJob supervisé
          restartPolicy: Never
          containers:
            - name: watchdog
              image: opencacao-api # tag/registre fixés par kustomization.yaml
              command: ["python", "-m", "app.curation.watchdog"]
              env:
                - { name: ENRICH_CRONJOB, value: "enrichissement-rag" }
                - { name: WATCHDOG_MAX_AGE_H, value: "26" }
                - { name: LOG_LEVEL, value: "INFO" }
                - { name: ZEPTOMAIL_API_URL, value: "https://api.zeptomail.com/v1.1/email" }
                # Expéditeur vérifié dans le Mail Agent ZeptoMail (noreply@ -> SM_147 refusé).
                - { name: EMAIL_FROM, value: "waopron@openlabconsulting.com" }
                - { name: EMAIL_FROM_NAME, value: "OpenCacao" }
                - { name: EMAIL_TEAM, value: "waopron@openlabconsulting.com" }
                - name: ZEPTOMAIL_TOKEN # optionnel : absent -> email simplement sauté
                  valueFrom:
                    secretKeyRef:
                      name: opencacao-email
                      key: ZEPTOMAIL_TOKEN
                      optional: true
              resources:
                requests: { cpu: "50m", memory: "64Mi" }
                limits: { cpu: "250m", memory: "256Mi" }

# Manifeste des sources documentaires officielles de la filière cacao ivoirienne.
#
# Chaque entrée décrit un document public téléchargé par le pipeline RAG
# (training/scripts/build_corpus_rag.py) pour ancrer la génération du corpus Q/R.
#
# Le champ `source` DOIT correspondre exactement à l'un des noms reconnus par
# le validateur (training/scripts/enrich_corpus.py → SOURCES) afin que les
# réponses générées passent le contrôle « source citée » :
#   "CNRA", "ANADER", "Conseil du Café-Cacao", "FAO".
#
# Statut juridique : documents publics diffusés par les institutions de la
# filière. Le corpus dérivé est publié sous CC BY-NC-SA 4.0 (cf. CLAUDE §1.2).
# Aucune donnée nominative n'est collectée.


# Entraînement (GPU loué, ponctuel). Lit corpus/ et écrit models/lora-adapter/.
services:
  training:
    build:
      context: ./training
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - ./corpus:/corpus:ro
      - ./models:/models
      - hf-cache:/cache/huggingface
    # Entraîne sur le corpus ASSEMBLÉ (teacher + rag + amorce + refus + cure), produit
    # par `make corpus-assemble` (lancé automatiquement par `make train`). Inclut donc
    # les exemples de refus/garde-fous, contrairement à l'ancien rag+amorce brut.
    command: >-
      python scripts/train_lora.py
      --corpus /corpus/corpus_entrainement.jsonl
      --output /models/lora-adapter
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf-cache:

<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>OpenCacao — Console de curation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="flag-strip" aria-hidden="true"></div>

    <!-- Écran de connexion -->
    <main class="login-wrap" id="login" hidden>
      <form class="login-card" id="login-form" autocomplete="on">
        <div class="login-emblem" aria-hidden="true">🌱</div>
        <h1 class="login-title">Console de curation</h1>
        <p class="login-sub">OpenCacao — espace réservé</p>

        <label class="champ">
          <span>Utilisateur</span>
          <input id="utilisateur" name="username" type="text" autocomplete="username" required />
        </label>
        <label class="champ">
          <span>Mot de passe</span>
          <input id="mot_de_passe" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button class="login-btn" type="submit" id="login-btn">Se connecter</button>
        <p class="login-erreur" id="login-erreur" role="alert" aria-live="assertive"></p>
      </form>
      <footer class="login-pied">OpenLab Consulting · IA souveraine pour la Côte d'Ivoire</footer>
    </main>

    <!-- Console (après authentification) -->
    <div id="console" hidden>
      <header class="topbar">
        <h1>🧪 Console de curation — OpenCacao</h1>
        <div class="topbar-droite">
          <span class="stats" id="stats" aria-live="polite"></span>
          <button type="button" class="logout" id="logout">Se déconnecter</button>
        </div>
      </header>

      <main class="liste" id="liste">
        <p class="vide" id="chargement">Chargement…</p>
      </main>
    </div>

    <template id="modele-carte">
      <article class="carte">
        <div class="meta-ligne">
          <span class="badge confiance"></span>
          <span class="badge votes"></span>
          <span class="badge sources"></span>
        </div>
        <p class="question"></p>
        <label class="lab">Réponse à valider (corrigez si besoin) :</label>
        <textarea class="reponse" rows="6"></textarea>
        <div class="actions">
          <button type="button" class="btn valider">✓ Valider au corpus</button>
          <button type="button" class="btn rejeter">✕ Rejeter</button>
          <span class="etat" aria-live="polite"></span>
        </div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>

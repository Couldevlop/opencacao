# Interface web OpenCacao servie en statique (nginx) — démo locale.
#
#   docker compose -f docker-compose.web.yml up -d
#   -> http://localhost:5173  (puis ⚙️ pour renseigner l'URL de l'API)
#
# Sert le contenu de ./web tel quel (modules ES, assets). Indépendant de l'API :
# l'interface appelle l'API à l'URL configurée dans le navigateur.
services:
  web:
    image: nginx:1.27-alpine
    container_name: opencacao-web
    ports:
      - "5173:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./deploy/web.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
